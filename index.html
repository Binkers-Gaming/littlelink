<!DOCTYPE html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en"> <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Binkers</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png"> <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="A guy who plays games online and does stuff.">

    <!-- Keywords -->
    <meta name="keywords" content="your name, industry, and specialties">

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://binkers.xyz">

    <!-- Author Information -->
    <meta name="author" content="Binkers">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">
    <link rel="stylesheet" href="css/whatnot.css">

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="Binkers Gaming">

            <!-- Replace with your name or brand -->
            <h1>
              <div>Binkers</div>
            </h1>

            <!-- Add a short description about yourself or your brand -->
            <p>A guy who plays online games and does stuff.</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- Discord -->
              <a class="button button-discord" href="https://discord.gg/y2ZQ7zkbzy" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/discord.svg" alt="Discord Logo">Join The Discord</a>
              
              <!-- Steam Alt -->
              <a class="button button-steam-alt" href="https://steamcommunity.com/id/FattyChris/" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/steam.svg" alt="Steam Logo">My Steam</a>

              <!-- Twitch -->
              <a class="button button-twitch" href="https://www.twitch.tv/binkersgamingofficial" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/twitch.svg" alt="Twitch Logo">Follow Me on Twitch</a>
              
              <!-- YouTube Alt -->
              <a class="button button-yt-alt" href="https://www.youtube.com/@binkersgaming" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/youtube-alt.svg" alt="YouTube Logo">Subscribe on YouTube</a>
              
              <!-- Whatnot -->
              <a class="button button-whatnot" href="https://www.whatnot.com/user/binkerz" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/whatnot.svg" alt="Whatnot Logo">Follow Me on Whatnot</a>
              
              <!-- Generic Email Alt -->
              <a class="button button-default" href="mailto:binkers@binkers.xyz" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-email-alt.svg" alt="Email Icon">Email Me</a>
              
              <!-- Generic Website -->
              <a class="button button-default" href="https://panel.binkers.xyz" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/generic-website.svg" alt="Website Icon">Visit City Hosting Panel</a>

      </div>

      <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
      <footer>
        <a href="privacy.html">Privacy Policy</a> | Build your own by forking <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
      </footer>

    </div>
  </div>

</body>

</html>
